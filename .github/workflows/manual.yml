# This is a basic workflow that is manually triggered

name: Sync Upstream

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      upstream:
        description: 'URL of the upstream repository'
        default: 'https://github.com/Homebrew/homebrew-core'
        required: true
      fork:
        description: 'URL of the fork repository'
        default: 'https://github.com/ryenus/homebrew-core'
        required: true
      branch:
        description: 'Branch to sync from upstream'
        default: 'master'
        required: true
      

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "greet"
  greet:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Runs a single command using the runners shell
    - name: sync-upstream
      run: |
        git clone ${{github.events.input.fork}} .
        git checkout ${{github.events.input.branch}}
        git remote add --mirror=fetch upstream https://github.com/Homebrew/homebrew-core
        git fetch ${{github.events.input.upstream}}
        git rebase upstream/${{github.events.input.branch}}
        git push
